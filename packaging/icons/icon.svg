<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2B1A12"/>
      <stop offset="55%" stop-color="#4A2A18"/>
      <stop offset="100%" stop-color="#6B3A1E"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC24B"/>
      <stop offset="55%" stop-color="#FF9A4D"/>
      <stop offset="100%" stop-color="#F0704A"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="48%" r="60%">
      <stop offset="0%" stop-color="#FFC24B" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#FF9A4D" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#F0704A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waveLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFC24B" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFC24B" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="waveRight" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#F0704A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#F0704A" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="180" ry="180" fill="url(#bg)"/>

  <circle cx="512" cy="480" r="420" fill="url(#halo)"/>

  <!-- Waveform bars (left) -->
  <g>
    <rect x="96"  y="472" width="22" height="80"  rx="8" fill="url(#waveLeft)" opacity="0.85"/>
    <rect x="150" y="422" width="22" height="180" rx="8" fill="url(#waveLeft)" opacity="0.7"/>
    <rect x="204" y="392" width="22" height="240" rx="8" fill="url(#waveLeft)" opacity="0.55"/>
    <rect x="258" y="442" width="22" height="140" rx="8" fill="url(#waveLeft)" opacity="0.4"/>
  </g>

  <!-- Waveform bars (right) -->
  <g>
    <rect x="744" y="442" width="22" height="140" rx="8" fill="url(#waveRight)" opacity="0.4"/>
    <rect x="798" y="392" width="22" height="240" rx="8" fill="url(#waveRight)" opacity="0.55"/>
    <rect x="852" y="422" width="22" height="180" rx="8" fill="url(#waveRight)" opacity="0.7"/>
    <rect x="906" y="472" width="22" height="80"  rx="8" fill="url(#waveRight)" opacity="0.85"/>
  </g>

  <!-- Hexagonal mic capsule -->
  <g transform="translate(512, 460)">
    <path d="M 0 -280
             L 152 -192
             L 152 192
             L 0 280
             L -152 192
             L -152 -192 Z"
          fill="#241109" stroke="url(#warm)" stroke-width="18" stroke-linejoin="round"/>
    <g stroke="#FFD9A0" stroke-width="10" stroke-linecap="round" opacity="0.95">
      <line x1="-82" y1="-150" x2="82" y2="-150"/>
      <line x1="-94" y1="-80"  x2="94" y2="-80"/>
      <line x1="-100" y1="-10" x2="100" y2="-10"/>
      <line x1="-94" y1="60"   x2="94" y2="60"/>
      <line x1="-82" y1="130"  x2="82" y2="130"/>
    </g>
    <line x1="-82" y1="200" x2="82" y2="200" stroke="#F0704A" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- Mic stand -->
  <rect x="496" y="740" width="32" height="86" fill="url(#warm)" opacity="0.92"/>

  <!-- Mic base -->
  <path d="M 340 826
           L 684 826
           L 640 900
           L 384 900 Z"
        fill="url(#warm)"/>

  <path d="M 376 832 L 648 832" stroke="#FFD9A0" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
</svg>
